{% extends 'base.html' %}
{% block title %}Setup - Add Subjects{% endblock %}
{% block content %}

<div class="setup-progress">
    <div class="step done">1</div>
    <div class="step-line done"></div>
    <div class="step done">2</div>
    <div class="step-line done"></div>
    <div class="step active">3</div>
    <div class="step-line"></div>
    <div class="step">4</div>
</div>

<div class="page-header">
    <h2>📚 Step 3: Add Your Subjects</h2>
    <p>Enter all subjects you have this semester (you'll assign them to slots next)</p>
</div>

<div class="card">
    <form method="POST" id="subj-form" class="auth-form">
        <div id="subjects-list">
            <div class="subject-entry">
                <span class="subj-num">1</span>
                <input type="text" name="subject_name" placeholder="e.g. Mathematics" class="subject-input" required>
                <button type="button" class="btn-remove-subj" onclick="removeSubj(this)">✕</button>
            </div>
        </div>

        <button type="button" class="btn-add-subject" onclick="addSubject()">+ Add Subject</button>

        <div class="setup-actions">
            <a href="{{ url_for('setup_step1') }}" class="btn-secondary">← Back</a>
            <button type="submit" class="btn-primary btn-large">Next: Fill Timetable →</button>
        </div>
    </form>
</div>

<script>
let count = 1;
function addSubject() {
    count++;
    const list = document.getElementById('subjects-list');
    const div = document.createElement('div');
    div.className = 'subject-entry';
    div.innerHTML = `<span class="subj-num">${count}</span>
                     <input type="text" name="subject_name" placeholder="Subject name" class="subject-input">
                     <button type="button" class="btn-remove-subj" onclick="removeSubj(this)">✕</button>`;
    list.appendChild(div);
    div.querySelector('input').focus();
    updateNumbers();
}
function removeSubj(btn) {
    const entries = document.querySelectorAll('.subject-entry');
    if (entries.length > 1) {
        btn.parentElement.remove();
        updateNumbers();
    }
}
function updateNumbers() {
    document.querySelectorAll('.subj-num').forEach((el, i) => el.textContent = i + 1);
}
</script>
{% endblock %}
